#
# Whenever a new tag starting with "AY" is pushed, add the tagged version
# to the Moodle Plugins directory at https://moodle.org/plugins
#
# revision: 2021070201
#
name: Releasing in the Plugins directory

on:
  push:
    tags:
      - AY*

  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to be released'
        required: true

defaults:
  run:
    shell: bash

jobs:
  release-at-moodle-org:
    runs-on: ubuntu-latest
    env:
      PLUGIN: report_allylti
      CURL: curl -sS
      ENDPOINT: https://moodle.org/webservice/rest/server.php
      TOKEN: ${{ secrets.MOODLE_ORG_TOKEN }}
      FUNCTION: local_plugins_add_version

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Validate branch
        if: github.event_name == 'push'
        run: |
          BRANCH="${{ github.event.base_ref }}"
          if [[ -z "${BRANCH}" ]]; then
            BRANCH=$(git branch -r --contains ${{ github.sha }} | grep -oP 'origin/MOODLE_[0-9]+_STABLE' | head -1)
          fi
          if [[ ! "${BRANCH}" =~ MOODLE_[0-9]+_STABLE ]]; then
            echo "Tag must be pushed from a MOODLE_[0-9]+_STABLE branch"
            exit 1
          fi
          echo "Tag validated on branch: ${BRANCH}"

      - name: Call the service function
        id: add-version
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [[ ! -z "${INPUT_TAG}" ]]; then
            TAGNAME="${INPUT_TAG}"
          elif [[ $GITHUB_REF = refs/tags/* ]]; then
            TAGNAME="${GITHUB_REF##*/}"
          fi
          if [[ -z "${TAGNAME}" ]]; then
            echo "No tag name has been provided!"
            exit 1
          fi
          if [[ ! "${TAGNAME}" =~ ^AY ]]; then
            echo "Tag must begin with 'AY'"
            exit 1
          fi
          ZIPURL="https://api.github.com/repos/${{ github.repository }}/zipball/${TAGNAME}"
          for ATTEMPT in {1..3}; do
            HTTP_CODE=$(${CURL} -w "%{http_code}" -o response.json ${ENDPOINT} --data-urlencode "wstoken=${TOKEN}" \
                                           --data-urlencode "wsfunction=${FUNCTION}" \
                                           --data-urlencode "moodlewsrestformat=json" \
                                           --data-urlencode "frankenstyle=${PLUGIN}" \
                                           --data-urlencode "zipurl=${ZIPURL}" \
                                           --data-urlencode "vcssystem=git" \
                                           --data-urlencode "vcsrepositoryurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
                                           --data-urlencode "vcstag=${TAGNAME}" \
                                           --data-urlencode "changelogurl=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commits/${TAGNAME}" \
                                           --data-urlencode "altdownloadurl=${ZIPURL}")
            if [[ ${HTTP_CODE} -ge 200 && ${HTTP_CODE} -lt 300 ]]; then
              break
            elif [[ $ATTEMPT -lt 3 ]]; then
              echo "Attempt $ATTEMPT failed with HTTP ${HTTP_CODE}, retrying..."
              sleep $((ATTEMPT * 5))
            else
              echo "Failed after 3 attempts with HTTP ${HTTP_CODE}"
              cat response.json
              exit 1
            fi
          done
          echo "response=$(cat response.json)" >> $GITHUB_OUTPUT

      - name: Evaluate the response
        id: evaluate-response
        env:
          RESPONSE: ${{ steps.add-version.outputs.response }}
        run: |
          jq <<< "${RESPONSE}"
          jq --exit-status ".id" <<< "${RESPONSE}" > /dev/null
